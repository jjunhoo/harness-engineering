name: Harness CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Structure and harness gates
        run: bash scripts/harness-validate.sh

  agent-loop:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - name: Agent execution loop (automated gates)
        env:
          HARNESS_PLAN: plans/2026-04-20-harness-repo-bootstrap.md
        run: bash scripts/harness-agent-loop.sh run --all

  auto-score:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
      - name: Auto evaluation (structure · code quality · performance)
        run: bash evaluations/scripts/auto-score.sh
      - name: Upload score report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: auto-score-report
          path: evaluations/reports/last-run.json
