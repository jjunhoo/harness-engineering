name: Sample Todo App

on:
  push:
    paths:
      - "sample/todo-app/**"
      - ".github/workflows/sample-todo-ci.yml"
  pull_request:
    paths:
      - "sample/todo-app/**"
      - ".github/workflows/sample-todo-ci.yml"

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sample/todo-app/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Maven test
        run: mvn -B test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sample/todo-app/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sample/todo-app/frontend/package-lock.json
      - name: Install & build
        run: npm ci && npm run build
      - name: Build
        run: npm run build
