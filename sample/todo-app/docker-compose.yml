services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "18080:8080"

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      VITE_PROXY_TARGET: http://backend:8080
    command: sh -c "npm ci && npx vite --host 0.0.0.0 --port 5173"
    ports:
      - "15173:5173"
    depends_on:
      - backend
